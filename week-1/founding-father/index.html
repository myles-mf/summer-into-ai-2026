<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOUNDING FATHER A.I. — 8-Bit America</title>
<meta name="description" content="Chat with an 8-bit Ben Franklin, Washington, Jefferson, or Abigail Adams — an AI talks back, for Summer Into AI Theme 1: 8-Bit America." />
<style>
  :root { --red:#c1272d; --white:#f4f1e8; --blue:#3f63c8; --navy:#1a2a55; --gold:#e8c34a; --ink:#07080f; --parch:#f0e6c8; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--ink); color:var(--white); font-family:"Courier New",monospace; }
  body { display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px; min-height:100%; }
  h1 { font-size:clamp(15px,3.2vw,26px); letter-spacing:2px; text-shadow:3px 3px 0 var(--red),-1px -1px 0 var(--blue); text-align:center; margin-top:4px; }
  h1 .star { color:var(--gold); }
  .sub { font-size:11px; opacity:.65; letter-spacing:1px; text-align:center; }

  .chars { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .char { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:6px 8px; border:3px solid #22305a; background:#0c1226; min-width:84px; }
  .char.on { border-color:var(--gold); background:#15203f; }
  .char canvas { width:48px; height:48px; image-rendering:pixelated; }
  .char span { font-size:10px; letter-spacing:1px; }

  .stage { width:660px; max-width:100%; border:4px solid var(--gold); box-shadow:0 0 0 4px var(--ink),0 0 28px rgba(232,195,74,.3); background:#04050a; display:flex; flex-direction:column; }
  .stage { position:relative; }
  .stage::after { content:""; position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg, rgba(0,0,0,.13) 0 1px, transparent 1px 3px); mix-blend-mode:multiply; }
  #log { height:360px; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
  .msg { display:flex; gap:8px; max-width:88%; font-size:13px; line-height:1.45; }
  .msg .av { width:28px; height:28px; flex:0 0 28px; image-rendering:pixelated; }
  .msg .bub { padding:8px 11px; border:2px solid; }
  .msg.them { align-self:flex-start; }
  .msg.them .bub { background:var(--parch); color:#2a2113; border-color:var(--gold); }
  .msg.me { align-self:flex-end; flex-direction:row-reverse; }
  .msg.me .bub { background:var(--navy); color:var(--white); border-color:var(--blue); }
  .msg.sys .bub { background:#2a0e10; color:#f4c9c9; border-color:var(--red); font-size:12px; }
  .typing { font-size:12px; opacity:.7; padding:4px 14px; font-style:italic; }
  .starters { display:flex; gap:6px; flex-wrap:wrap; padding:0 14px 10px; }
  .starters button { font-size:11px; background:#11183a; color:var(--white); border:1px solid #2a3a6a; padding:5px 8px; cursor:pointer; text-transform:none; letter-spacing:0; }
  .inrow { display:flex; gap:0; border-top:3px solid var(--gold); }
  #input { flex:1; background:#0a0e1f; color:var(--white); border:none; padding:12px; font-family:inherit; font-size:14px; }
  #input:focus { outline:none; background:#0d1226; }
  #send { font-family:inherit; font-size:13px; letter-spacing:1px; color:var(--ink); background:var(--gold); border:none; padding:0 18px; cursor:pointer; text-transform:uppercase; }
  #send:disabled { opacity:.5; cursor:default; }
  .hint { font-size:11px; opacity:.5; text-align:center; max-width:640px; line-height:1.5; }
</style>
</head>
<body>
  <h1><span class="star">★</span> FOUNDING FATHER A.I. <span class="star">★</span></h1>
  <div class="sub">a glowing 8-bit telegraph to 1776 &middot; ask the founders anything &middot; 8-BIT AMERICA</div>

  <div class="chars" id="chars"></div>

  <div class="stage">
    <div id="log"></div>
    <div class="typing" id="typing" style="display:none"></div>
    <div class="starters" id="starters"></div>
    <div class="inrow">
      <input id="input" type="text" maxlength="500" placeholder="Ask a question across the centuries…" autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>

  <div class="hint">
    An A.I. <i>imagines</i> these founders in 8-bit — good for fun and a spark of history, not a citation. Built for Summer Into AI — Theme&nbsp;1: 8-Bit America.
  </div>

<script>
(() => {
  "use strict";
  // ---- characters ----------------------------------------------------------
  const CHARS = {
    franklin:   { name:"Franklin",   skin:"#e9c39a", hair:"#cfd3da", hat:null,        glasses:true,
      greeting:"Ah — a traveler from 2026, and pixelated besides! I am Benjamin Franklin. Ask away; I do love a good question.",
      starters:["How do I fly a kite in a storm?","Best advice for a young person?","Is the experiment worth the risk?"] },
    washington: { name:"Washington", skin:"#e9c39a", hair:"#eceff4", hat:null,        glasses:false,
      greeting:"Good day. I am George Washington. Speak plainly and I shall answer in kind — though I confess this 8-bit form is most peculiar.",
      starters:["Why no king for America?","What makes a good leader?","Were you really first?"] },
    jefferson:  { name:"Jefferson",  skin:"#ecc59a", hair:"#b5713a", hat:null,        glasses:false,
      greeting:"Welcome, friend of the future. Thomas Jefferson, at your service. Liberty, books, and good questions — my favorite things.",
      starters:["What does 'all men are created equal' mean?","Tell me about Monticello.","Coffee or tea?"] },
    abigail:    { name:"Abigail Adams", skin:"#ecc7a0", hair:"#7a5230", hat:"#e9e2cf", glasses:false,
      greeting:"How extraordinary — a voice from 2026! I am Abigail Adams. Mind you, do not forget to remember the ladies.",
      starters:["Why 'remember the ladies'?","Advice for women today?","What was life like in 1776?"] },
  };
  let current = "franklin";
  let history = []; // {role, content}

  // ---- pixel avatars -------------------------------------------------------
  function drawAvatar(cv, cfg) {
    const x = cv.getContext("2d"), N = 12, s = cv.width / N;
    x.clearRect(0,0,cv.width,cv.height);
    const px = (cx,cy,col)=>{ x.fillStyle=col; x.fillRect(cx*s, cy*s, s, s); };
    // hat (bonnet/tricorn) on top rows if set
    if (cfg.hat) { for (let c=2;c<=9;c++){ px(c,0,cfg.hat); px(c,1,cfg.hat); } px(1,1,cfg.hat); px(10,1,cfg.hat); }
    // hair / wig
    const hairTop = cfg.hat ? 2 : 0;
    for (let c=2;c<=9;c++){ px(c,hairTop,cfg.hair); }
    px(1,hairTop+1,cfg.hair); px(10,hairTop+1,cfg.hair);
    for (let r=hairTop+1;r<=hairTop+2;r++){ px(2,r,cfg.hair); px(9,r,cfg.hair); }
    // face
    for (let r=hairTop+2;r<=9;r++) for (let c=3;c<=8;c++) px(c,r,cfg.skin);
    // eyes
    px(4,hairTop+4,"#1a1a1a"); px(7,hairTop+4,"#1a1a1a");
    if (cfg.glasses){ x.strokeStyle="#1a1a1a"; x.lineWidth=Math.max(1,s*0.3);
      x.strokeRect(3.5*s,(hairTop+3.6)*s, 2*s, 1.6*s); x.strokeRect(6.5*s,(hairTop+3.6)*s, 2*s, 1.6*s); }
    // mouth
    px(5,hairTop+6,"#8a4a4a"); px(6,hairTop+6,"#8a4a4a");
  }

  // ---- character picker ----------------------------------------------------
  const charsEl = document.getElementById("chars");
  Object.entries(CHARS).forEach(([id, cfg]) => {
    const d = document.createElement("div"); d.className = "char" + (id===current?" on":""); d.dataset.id = id;
    const cv = document.createElement("canvas"); cv.width = 48; cv.height = 48;
    drawAvatar(cv, cfg);
    const sp = document.createElement("span"); sp.textContent = cfg.name;
    d.appendChild(cv); d.appendChild(sp);
    d.addEventListener("click", () => selectChar(id));
    charsEl.appendChild(d);
  });

  function selectChar(id) {
    current = id; history = [];
    document.querySelectorAll(".char").forEach(c => c.classList.toggle("on", c.dataset.id === id));
    document.getElementById("log").innerHTML = "";
    addMsg("them", CHARS[id].greeting);
    renderStarters();
    document.getElementById("input").focus();
  }

  // ---- messages ------------------------------------------------------------
  const log = document.getElementById("log");
  function avatarImg() {
    const cv = document.createElement("canvas"); cv.width = 28; cv.height = 28; cv.className = "av";
    drawAvatar(cv, CHARS[current]); return cv;
  }
  function addMsg(who, text) {
    const m = document.createElement("div"); m.className = "msg " + who;
    if (who === "them") m.appendChild(avatarImg());
    const b = document.createElement("div"); b.className = "bub"; b.textContent = text;
    m.appendChild(b); log.appendChild(m); log.scrollTop = log.scrollHeight;
  }
  function renderStarters() {
    const el = document.getElementById("starters"); el.innerHTML = "";
    CHARS[current].starters.forEach(q => {
      const b = document.createElement("button"); b.textContent = q;
      b.addEventListener("click", () => { if (!busy) send(q); });
      el.appendChild(b);
    });
  }

  // ---- send / API ----------------------------------------------------------
  let busy = false;
  const input = document.getElementById("input"), sendBtn = document.getElementById("send"), typing = document.getElementById("typing");
  async function send(text) {
    text = (text || input.value).trim(); if (!text || busy) return;
    input.value = ""; addMsg("me", text);
    history.push({ role: "user", content: text });
    document.getElementById("starters").innerHTML = "";
    busy = true; sendBtn.disabled = true;
    typing.style.display = "block"; typing.textContent = CHARS[current].name + " is quilling a reply…";
    try {
      const r = await fetch("api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ character: current, messages: history }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
      addMsg("them", data.reply);
      history.push({ role: "assistant", content: data.reply });
    } catch (e) {
      const local = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      addMsg("sys", local
        ? "⚠ No API here — the /api/chat function only runs on the Vercel deployment. Locally the UI works but the founders stay silent."
        : "⚠ " + (e.message || "Could not reach the founders.") + " (Is the OpenAI key set in Vercel, with spend left?)");
    } finally {
      busy = false; sendBtn.disabled = false; typing.style.display = "none"; input.focus();
    }
  }
  sendBtn.addEventListener("click", () => send());
  input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

  // ---- boot ----------------------------------------------------------------
  selectChar("franklin");
})();
</script>
</body>
</html>
